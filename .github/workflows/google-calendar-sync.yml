name: Google Calendar Sync

on:
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger hourly Google Calendar sync
        env:
          GOOGLE_SYNC_SECRET: ${{ secrets.REMINDER_DISPATCH_SECRET }}
          GOOGLE_SYNC_URL: https://edwin-ai-todo.vercel.app/api/planner/google/sync/dispatch
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${GOOGLE_SYNC_SECRET}" \
            "${GOOGLE_SYNC_URL}"
